# .pre-commit-config.yaml
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.2
    hooks:
      # Lint and auto-fix.
      - id: ruff
        args: [--fix]
      # Enforce consistent formatting.
      - id: ruff-format

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      # Validate Python syntax before anything else runs.
      - id: check-ast
      # Catch unresolved merge conflict markers.
      - id: check-merge-conflict
      # Prevent accidentally committing kubeconfigs, credentials, etc.
      - id: detect-private-key
      # Guard against large file commits (logs, model artifacts, etc.).
      - id: check-added-large-files
        args: [--maxkb=500]

  - repo: https://github.com/PyCQA/bandit
    rev: 1.9.4
    hooks:
      - id: bandit
        args: [-c, pyproject.toml]
        # Only scan application source, not tests.
        files: ^services/